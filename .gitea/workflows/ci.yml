name: CI / Test

# Runs on every PR touching Go code, and on every push to main.
# Mirrors the test job from release.yml so PRs are validated independently
# of the release workflow. Uses Go 1.25 to match release.yml.

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Tidy
        run: go mod tidy && git diff --exit-code go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...

  all-required:
    name: all-required
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check test result
        run: |
          result="${{ needs.test.result }}"
          if [ "$result" != "success" ]; then
            echo "Required job test failed (result: $result)"
            exit 1
          fi
          echo "All required jobs passed"
